name: Sync Monitor Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production sync
        run: |
          curl --fail --silent --show-error -X POST "https://survellianceplatform.vercel.app/api/admin/sync"
