name: Sync Monitor Data

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "scripts/**"
      - ".github/workflows/sync-monitor.yml"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "0 * * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-seed-on-main-update:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Refresh store seed
        env:
          GFM_MIN_SYNC_MINUTES: "60"
          GFM_SYNC_MODE: "light"
        run: |
          node ./scripts/update-seed-from-remote-sync.js

      - name: Commit updated seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/store.seed.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh monitor seed data"
          git push origin HEAD:monitor-data --force-with-lease

  sync-daily-full:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Refresh store seed with full backfill
        env:
          GFM_MIN_SYNC_MINUTES: "0"
          GFM_SYNC_MODE: "full"
        run: |
          node ./scripts/update-seed-from-remote-sync.js

      - name: Commit updated seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/store.seed.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh monitor seed data (full)"
          git push origin HEAD:monitor-data --force-with-lease
